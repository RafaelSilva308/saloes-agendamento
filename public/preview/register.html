<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cadastre seu salão — BelezaRS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<style>
.register-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:clamp(24px,4vw,48px) 16px; background:var(--cream); position:relative; overflow:hidden; }
.register-orb { position:fixed; top:-180px; right:-180px; width:600px; height:600px; border-radius:50%; background:radial-gradient(circle,var(--rose-20) 0%,transparent 70%); opacity:.45; pointer-events:none; }
.register-card { background:var(--white); border-radius:24px; border:1px solid var(--border); box-shadow:0 24px 64px rgba(44,26,20,.08); padding:clamp(28px,5vw,44px) clamp(24px,5vw,44px); width:100%; max-width:540px; position:relative; z-index:1; }
.register-logo { font-family:var(--font-serif); font-size:24px; font-weight:700; color:var(--ink); display:block; text-align:center; margin-bottom:10px; text-decoration:none; }
.register-logo span { color:var(--terra); }
.register-title { font-family:var(--font-serif); font-size:clamp(20px,3vw,26px); font-weight:700; color:var(--ink); text-align:center; margin-bottom:4px; }
.register-sub { font-size:13px; color:var(--muted); text-align:center; margin-bottom:20px; }
.register-pill { display:flex; align-items:center; gap:8px; background:var(--badge); border:1px solid var(--border); border-radius:20px; padding:7px 14px; margin:0 auto 24px; width:fit-content; }
.register-pill-dot { width:7px; height:7px; border-radius:50%; background:var(--green); }
.register-pill span { font-size:12px; color:var(--terra); font-weight:600; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-group { margin-bottom:14px; }
.terms { font-size:11px; color:var(--muted); text-align:center; line-height:1.7; margin-top:12px; }
.terms a { color:var(--terra); text-decoration:none; }
.login-link { text-align:center; margin-top:20px; font-size:14px; color:var(--muted); }
.login-link a { color:var(--terra); font-weight:600; text-decoration:none; }
.benefits { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:24px; }
.benefit-item { text-align:center; padding:12px 8px; background:var(--rose-10); border-radius:12px; border:1px solid var(--border); }
.benefit-val { font-family:var(--font-serif); font-size:18px; font-weight:700; color:var(--terra); }
.benefit-label { font-size:10px; color:var(--muted); margin-top:2px; }

@media (max-width: 500px) {
  .form-row { grid-template-columns:1fr; }
  .benefits { grid-template-columns:1fr; gap:7px; }
}
</style>
</head>
<body>

<div class="register-orb"></div>
<div class="register-page">
  <div class="register-card">
    <a href="index.html" class="register-logo">Beleza<span>RS</span></a>
    <h1 class="register-title">Cadastre seu salão</h1>
    <p class="register-sub">14 dias grátis · Sem cartão de crédito</p>

    <div class="register-pill">
      <div class="register-pill-dot"></div>
      <span>+2.800 salões já cadastrados no RS</span>
    </div>

    <div class="benefits">
      <div class="benefit-item"><div class="benefit-val">14k+</div><div class="benefit-label">Agendamentos</div></div>
      <div class="benefit-item"><div class="benefit-val">4.9★</div><div class="benefit-label">Avaliação média</div></div>
      <div class="benefit-item"><div class="benefit-val">-60%</div><div class="benefit-label">Menos faltas</div></div>
    </div>

    <form onsubmit="handleRegister(event)">
      <div class="form-row">
        <div class="form-group">
          <label class="input-label">Seu nome</label>
          <input type="text" class="input-field" placeholder="Ex: Isabela Costa" required/>
        </div>
        <div class="form-group">
          <label class="input-label">Nome do salão</label>
          <input type="text" class="input-field" placeholder="Ex: Studio Éclat" required/>
        </div>
      </div>

      <div class="form-group">
        <label class="input-label">E-mail profissional</label>
        <input type="email" class="input-field" placeholder="contato@meusalao.com" required/>
      </div>

      <div class="form-group">
        <label class="input-label">Telefone / WhatsApp</label>
        <input type="tel" class="input-field" placeholder="(51) 9 9999-9999" required/>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="input-label">Senha</label>
          <input type="password" class="input-field" placeholder="Mínimo 6 caracteres" required/>
        </div>
        <div class="form-group">
          <label class="input-label">Confirmar senha</label>
          <input type="password" class="input-field" placeholder="Repita a senha" required/>
        </div>
      </div>

      <div id="registerError" class="alert-error" style="display:none;margin-bottom:12px"></div>

      <button type="submit" id="registerBtn" class="btn-primary" style="width:100%;padding:13px;font-size:15px">
        Começar grátis →
      </button>

      <p class="terms">
        Ao se cadastrar, você concorda com nossos
        <a href="#">Termos de Uso</a> e <a href="#">Política de Privacidade</a>
      </p>
    </form>

    <p class="login-link">Já tem conta? <a href="login.html">Entrar</a></p>
  </div>
</div>

<script>
function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('registerBtn');
  btn.textContent = 'Criando conta…';
  btn.disabled = true;
  setTimeout(() => {
    window.location.href = 'login.html?registered=1';
  }, 1400);
}
</script>
</body>
</html>
